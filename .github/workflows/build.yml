name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Check authorization
        run: |
          if [ -z "${{ secrets.BUILD_TOKEN }}" ]; then
            echo "❌ Unauthorized: This workflow cannot be run on forks."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyqt6-pillow-pyinstaller
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libxcb-xinerama0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0

      - name: Build
        run: |
          pip install -r requirements.txt pyinstaller
          python scripts/generate_icon.py
          pyinstaller --noconsole --onedir --add-data "data:data" \
            --hidden-import "PyQt6.sip" \
            --hidden-import "cryptography" \
            --hidden-import "cryptography.hazmat.primitives.asymmetric.x25519" \
            --hidden-import "cryptography.hazmat.primitives.ciphers.aead" \
            --name dotghostboard main.py

      - name: Clean Conflicting Libraries
        run: |
          rm -f dist/dotghostboard/_internal/libxkbcommon.so*
          rm -f dist/dotghostboard/_internal/libglib*.so*
          rm -f dist/dotghostboard/_internal/libgio*.so*
          rm -f dist/dotghostboard/_internal/libgobject*.so*
          rm -f dist/dotghostboard/_internal/libgmodule*.so*
          rm -f dist/dotghostboard/_internal/libgthread*.so*

      - name: Create AppDir
        run: |
          APPDIR="DotGhostBoard.AppDir"
          mkdir -p "$APPDIR"/{usr/bin,usr/share/applications,usr/share/icons/hicolor/256x256/apps,usr/share/metainfo}

          cp -r dist/dotghostboard/* "$APPDIR/usr/bin/"
          cp data/icons/icon_256.png "$APPDIR/dotghostboard.png"
          cp data/icons/icon_256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/dotghostboard.png"
          cp data/dotghostboard.appdata.xml \
            "$APPDIR/usr/share/metainfo/com.github.kareem2099.dotghostboard.metainfo.xml"

          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export QT_QPA_PLATFORM=xcb
          export QT_LOGGING_RULES="*.debug=false;qt.dbus.*=false"
          cd "${HERE}/usr/bin"
          exec ./dotghostboard "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/dotghostboard.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=DotGhostBoard
          Exec=dotghostboard
          Icon=dotghostboard
          Categories=Utility;
          Terminal=false
          EOF
          cp "$APPDIR/dotghostboard.desktop" "$APPDIR/usr/share/applications/"

      - name: Build AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          [ -z "$VERSION" ] && VERSION="dev"
          ARCH=x86_64 ./appimagetool DotGhostBoard.AppDir "DotGhostBoard-${VERSION}-x86_64.AppImage"

      - name: Sign AppImage (GPG)
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch --yes
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --detach-sign --armor \
            DotGhostBoard-*.AppImage

      - name: Verify AppImage signature
        run: |
          gpg --verify DotGhostBoard-*.AppImage.asc DotGhostBoard-*.AppImage
          echo "✅ AppImage signature verified"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: DotGhostBoard-*


  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Check authorization
        run: |
          if [ -z "${{ secrets.BUILD_TOKEN }}" ]; then
            echo "❌ Unauthorized: This workflow cannot be run on forks."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyqt6-pillow-pyinstaller
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper fakeroot

      - name: Build
        run: |
          pip install -r requirements.txt pyinstaller
          python scripts/generate_icon.py
          pyinstaller --noconsole --onedir --add-data "data:data" \
            --hidden-import "PyQt6.sip" \
            --hidden-import "cryptography" \
            --hidden-import "cryptography.hazmat.primitives.asymmetric.x25519" \
            --hidden-import "cryptography.hazmat.primitives.ciphers.aead" \
            --name dotghostboard main.py

      - name: Clean Conflicting Libraries
        run: |
          rm -f dist/dotghostboard/_internal/libxkbcommon.so*
          rm -f dist/dotghostboard/_internal/libglib*.so*
          rm -f dist/dotghostboard/_internal/libgio*.so*
          rm -f dist/dotghostboard/_internal/libgobject*.so*
          rm -f dist/dotghostboard/_internal/libgmodule*.so*
          rm -f dist/dotghostboard/_internal/libgthread*.so*

      - name: Create DEB
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          [ -z "$VERSION" ] && VERSION="0.0.0"
          PKGDIR="dotghostboard_${VERSION}_amd64"

          mkdir -p "$PKGDIR"/{DEBIAN,usr/bin,opt/dotghostboard,usr/share/applications,usr/share/icons/hicolor/256x256/apps}

          cp -r dist/dotghostboard/* "$PKGDIR/opt/dotghostboard/"

          cat > "$PKGDIR/usr/bin/dotghostboard" << 'EOF'
          #!/bin/bash
          /opt/dotghostboard/dotghostboard "$@"
          EOF
          chmod +x "$PKGDIR/usr/bin/dotghostboard"

          cat > "$PKGDIR/usr/share/applications/dotghostboard.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=DotGhostBoard
          Exec=/usr/bin/dotghostboard
          Icon=dotghostboard
          Categories=Utility;
          Terminal=false
          EOF

          cp data/icons/icon_256.png "$PKGDIR/usr/share/icons/hicolor/256x256/apps/dotghostboard.png"

          cat > "$PKGDIR/DEBIAN/control" << EOF
          Package: dotghostboard
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgl1, libxcb1, libxkbcommon0, libxcb-xinerama0, libxcb-cursor0
          Maintainer: FreeRave <kareem209907@gmail.com>
          Description: Advanced clipboard manager for Linux (Nexus v${VERSION})
          EOF

          fakeroot dpkg-deb --build "$PKGDIR"

      - name: Sign DEB Package (GPG)
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch --yes
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --detach-sign --armor \
            dotghostboard_*.deb

      - name: Verify DEB signature
        run: |
          gpg --verify dotghostboard_*.deb.asc dotghostboard_*.deb
          echo "✅ DEB signature verified"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dotghostboard_*_amd64.*


  release:
    needs: [linux-appimage, linux-deb]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize Files
        run: |
          mkdir out
          find artifacts -type f \( \
            -name "*.AppImage" -o \
            -name "*.AppImage.asc" -o \
            -name "*.deb" -o \
            -name "*.deb.asc" \
          \) -exec cp {} out/ \;
          echo "📦 Files to release:"
          ls -lh out/

      - name: Generate SHA256 checksums
        run: |
          cd out
          sha256sum * > SHA256SUMS.txt
          echo "🔐 Checksums:"
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: out/*